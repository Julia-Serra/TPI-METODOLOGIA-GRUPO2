<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Login | BodyPaint</title>
    <link rel="stylesheet" href="styles.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        .auth-container {
            max-width: 400px;
            margin: 100px auto;
            padding: 40px;
            background-color: #231932;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.3);
        }

        .auth-container h1 {
            text-align: center;
            color: #bc2e7e;
            margin-bottom: 30px;
        }

        .auth-form {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .auth-group {
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        .auth-group label {
            color: #ccc;
            font-size: 13px;
            font-weight: 600;
        }

        .auth-form input {
            padding: 12px;
            border: 1px solid #bc2e7e;
            border-radius: 5px;
            background-color: #2a1f35;
            color: white;
            font-size: 14px;
            width: 100%;
            box-sizing: border-box;
        }

        .auth-form input:focus {
            outline: none;
            border-color: #ff69b4;
            box-shadow: 0 0 5px rgba(255, 105, 180, 0.5);
        }

        .auth-form button {
            padding: 12px;
            background-color: #bc2e7e;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
            font-weight: bold;
            transition: background-color 0.3s;
            margin-top: 10px;
        }

        .auth-form button:hover {
            background-color: #ff69b4;
        }

        .auth-toggle {
            text-align: center;
            margin-top: 20px;
            color: #999;
            font-size: 14px;
        }

        .auth-toggle a {
            color: #bc2e7e;
            cursor: pointer;
            text-decoration: underline;
        }

        .auth-toggle a:hover {
            color: #ff69b4;
        }

        .hidden-form {
            display: none;
        }

        .demo-users {
            background-color: #2a1f35;
            border: 1px solid #bc2e7e;
            border-radius: 5px;
            padding: 15px;
            margin-top: 20px;
            font-size: 12px;
            color: #ccc;
        }

        .demo-users h3 {
            color: #bc2e7e;
            margin-top: 0;
        }

        .demo-users p {
            margin: 5px 0;
        }

        .demo-user-btn {
            display: inline-block;
            margin-top: 8px;
            padding: 6px 12px;
            background-color: #444;
            color: #fff;
            border: none;
            border-radius: 3px;
            cursor: pointer;
            font-size: 11px;
            margin-right: 5px;
        }

        .demo-user-btn:hover {
            background-color: #666;
        }
    </style>
</head>
<body>

<div class="navbar">
    <div class="logo">🎨 BodyPaint</div>
    <div class="nav-links">
        <a href="index.html"><button>Inicio</button></a>
        <a href="producto.html"><button>Productos</button></a>
    </div>
</div>

<div class="auth-container">
    <div id="loginForm" class="auth-form">
        <h1>Ingresar</h1>
        
        <div class="auth-group">
            <label for="loginEmail">Correo Electrónico</label>
            <input type="email" id="loginEmail" placeholder="ejemplo@bodypaint.com">
        </div>

        <div class="auth-group">
            <label for="loginPassword">Contraseña</label>
            <input type="password" id="loginPassword" placeholder="••••••••">
        </div>

        <button onclick="handleLogin()">Login</button>
        
        <div class="auth-toggle">
            ¿No tienes cuenta? <a onclick="toggleForms()">Registrarse aquí</a>
        </div>
    </div>

    <div id="registerForm" class="auth-form hidden-form">
        <h1>Registrarse</h1>
        <div style="max-height: 400px; overflow-y: auto; padding-right: 5px; display: flex; flex-direction: column; gap: 12px;">
            <div class="auth-group">
                <label for="registerNombre">Nombre</label>
                <input type="text" id="registerNombre" placeholder="Tu nombre" required>
            </div>
            <div class="auth-group">
                <label for="registerApellido">Apellido</label>
                <input type="text" id="registerApellido" placeholder="Tu apellido" required>
            </div>
            <div class="auth-group">
                <label for="registerEmail">Email</label>
                <input type="email" id="registerEmail" placeholder="correo@ejemplo.com" required>
            </div>
            <div class="auth-group">
                <label for="registerPassword">Contraseña</label>
                <input type="password" id="registerPassword" placeholder="Mínimo 4 caracteres" required>
            </div>
            <div class="auth-group">
                <label for="registerConfirmPassword">Confirmar Contraseña</label>
                <input type="password" id="registerConfirmPassword" placeholder="Repetí tu contraseña" required>
            </div>
            <div class="auth-group">
                <label for="registerPais">País</label>
                <input type="text" id="registerPais" placeholder="Argentina" required>
            </div>
            <div class="auth-group">
                <label for="registerProvincia">Provincia</label>
                <input type="text" id="registerProvincia" placeholder="Córdoba" required>
            </div>
            <div class="auth-group">
                <label for="registerLocalidad">Localidad</label>
                <input type="text" id="registerLocalidad" placeholder="Villa María" required>
            </div>
            <div class="auth-group">
                <label for="registerCalle">Calle</label>
                <input type="text" id="registerCalle" placeholder="San Martín" required>
            </div>
            <div class="auth-group">
                <label for="registerNumero">Número de calle</label>
                <input type="text" id="registerNumero" placeholder="123" required>
            </div>
            <div class="auth-group">
                <label for="registerPiso">Piso (opcional)</label>
                <input type="text" id="registerPiso" placeholder="1">
            </div>
            <div class="auth-group">
                <label for="registerDepartamento">Departamento (opcional)</label>
                <input type="text" id="registerDepartamento" placeholder="A">
            </div>
        </div>
        <button onclick="handleRegister()">Registrarse</button>
        
        <div class="auth-toggle">
            ¿Ya tienes cuenta? <a onclick="toggleForms()">Ingresar aquí</a>
        </div>
    </div>

    <div class="demo-users">
        <h3>👤 Usuarios de Prueba</h3>
        <p><strong>Admin:</strong> admin@bodypaint.com / 1234</p>
        <button class="demo-user-btn" onclick="fillDemoUser('admin@bodypaint.com', '1234')">Usar Admin</button>
        <br>
        <p><strong>Cliente:</strong> cliente@bodypaint.com / 1234</p>
        <button class="demo-user-btn" onclick="fillDemoUser('cliente@bodypaint.com', '1234')">Usar Cliente</button>
        <br>
        <p><strong>Vendedor:</strong> vendedor@bodypaint.com / 1234</p>
        <button class="demo-user-btn" onclick="fillDemoUser('vendedor@bodypaint.com', '1234')">Usar Vendedor</button>
    </div>
</div>

<script src="auth.js"></script>
<script>
    // Configuración base de estilos para SweetAlerts (Acorde a la paleta de BodyPaint)
    const swalConfig = {
        confirmButtonColor: '#bc2e7e',
        background: '#231932',
        color: '#ffffff'
    };

    // Verificar si ya está autenticado
    if (isAuthenticated()) {
        const role = getCurrentRole();
        if (role === 'CLIENTE') window.location.href = '/index.html';
        else if (role === 'ADMIN') window.location.href = '/admin.html';
        else if (role === 'VENDEDOR') window.location.href = '/vendedor.html';
    }

    // Verificar si debe mostrar registro
    const urlParams = new URLSearchParams(window.location.search);
    if (urlParams.get('mode') === 'register') {
        toggleForms();
    }

    function toggleForms() {
        const loginForm = document.getElementById('loginForm');
        const registerForm = document.getElementById('registerForm');
        
        loginForm.classList.toggle('hidden-form');
        registerForm.classList.toggle('hidden-form');
    }

    function handleLogin() {
        const email = document.getElementById('loginEmail').value.trim();
        const password = document.getElementById('loginPassword').value;

        if (!email || !password) {
            Swal.fire({
                ...swalConfig,
                title: 'Campos incompletos',
                text: 'Por favor, completa todos los campos para ingresar.',
                icon: 'warning'
            });
            return;
        }

        const result = login(email, password);
        
        if (result.success) {
            Swal.fire({
                ...swalConfig,
                title: '¡Bienvenido de nuevo!',
                text: 'Autenticación exitosa. Redirigiendo...',
                icon: 'success',
                showConfirmButton: false,
                timer: 1500
            });
            
            setTimeout(() => {
                if (result.role === 'CLIENTE') window.location.href = '/index.html';
                else if (result.role === 'ADMIN') window.location.href = '/admin.html';
                else if (result.role === 'VENDEDOR') window.location.href = '/vendedor.html';
            }, 1200);
        } else {
            Swal.fire({
                ...swalConfig,
                title: 'Error de ingreso',
                text: result.message,
                icon: 'error'
            });
        }
    }

    function handleRegister() {
        const nombre = document.getElementById('registerNombre').value.trim();
        const apellido = document.getElementById('registerApellido').value.trim();
        const email = document.getElementById('registerEmail').value.trim();
        const password = document.getElementById('registerPassword').value;
        const confirmPassword = document.getElementById('registerConfirmPassword').value;
        const pais = document.getElementById('registerPais').value.trim();
        const provincia = document.getElementById('registerProvincia').value.trim();
        const localidad = document.getElementById('registerLocalidad').value.trim();
        const calle = document.getElementById('registerCalle').value.trim();
        const numero = document.getElementById('registerNumero').value.trim();
        const piso = document.getElementById('registerPiso').value.trim();
        const departamento = document.getElementById('registerDepartamento').value.trim();

        if (!nombre || !apellido || !email || !password || !confirmPassword || !pais || !provincia || !localidad || !calle || !numero) {
            Swal.fire({
                ...swalConfig,
                title: 'Campos requeridos',
                text: 'Por favor completa todos los campos obligatorios.',
                icon: 'warning'
            });
            return;
        }

        if (password !== confirmPassword) {
            Swal.fire({
                ...swalConfig,
                title: 'Contraseñas no coinciden',
                text: 'Verificá que ambas contraseñas ingresadas sean iguales.',
                icon: 'error'
            });
            return;
        }

        if (password.length < 4) {
            Swal.fire({
                ...swalConfig,
                title: 'Contraseña muy corta',
                text: 'La contraseña debe poseer al menos 4 caracteres.',
                icon: 'warning'
            });
            return;
        }

        const clienteData = {
            nombre, apellido, email, password, pais, provincia,
            localidad, calle, numero,
            piso: piso || null,
            departamento: departamento || null
        };

        const API = "http://localhost:8080";

        fetch(`${API}/clientes`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(clienteData)
        })
        .then(res => res.json())
        .then(data => {
            if (!data || data.message === 'Cliente creado') {
                Swal.fire({
                    ...swalConfig,
                    title: '¡Registro exitoso!',
                    text: 'Creando sesión e iniciando sistema...',
                    icon: 'success',
                    showConfirmButton: false,
                    timer: 2000
                });

                addUser(email, password, 'CLIENTE');

                const session = {
                    email: email,
                    role: 'CLIENTE',
                    token: 'Bearer ' + btoa(email + ':' + password),
                    loginTime: new Date().toISOString()
                };

                sessionStorage.setItem('auth_session', JSON.stringify(session));

                setTimeout(() => {
                    window.location.href = '/index.html';
                }, 1800);
            } else {
                Swal.fire({
                    ...swalConfig,
                    title: 'No se pudo registrar',
                    text: data.message || 'Ocurrió un error inesperado al dar de alta.',
                    icon: 'error'
                });
            }
        })
        .catch(e => {
            console.error(e);
            Swal.fire({
                ...swalConfig,
                title: 'Fallo de comunicación',
                text: 'No se pudo establecer conexión con el servidor de la API.',
                icon: 'error'
            });
        });
    }

    function fillDemoUser(email, password) {
        document.getElementById('loginEmail').value = email;
        document.getElementById('loginPassword').value = password;
    }

    document.getElementById('loginEmail').addEventListener('keypress', e => {
        if (e.key === 'Enter') handleLogin();
    });
    document.getElementById('loginPassword').addEventListener('keypress', e => {
        if (e.key === 'Enter') handleLogin();
    });
    document.getElementById('registerConfirmPassword').addEventListener('keypress', e => {
        if (e.key === 'Enter') handleRegister();
    });
</script>

</body>
</html>
