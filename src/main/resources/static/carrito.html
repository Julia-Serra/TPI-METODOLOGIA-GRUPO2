<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi Carrito | BodyPaint Studio</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;700&family=Playfair+Display:ital,wght@0,600;0,800;1,400&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="styles.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

    <style>
        /* Estilos Avanzados para la Interfaz del Carrito y Checkout */
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: #1a1226;
            margin: 0;
            color: #ffffff;
        }

        .container-carrito {
            max-width: 1200px;
            margin: 0 auto;
            padding: 40px 20px;
        }

        .titulo-seccion {
            font-family: 'Playfair Display', serif;
            font-size: 2.5rem;
            font-weight: 800;
            margin-bottom: 30px;
            background: linear-gradient(45deg, #ffffff, #ff69b4);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* Layout de dos columnas: Carrito a la izquierda, Checkout a la derecha */
        .layout-carrito {
            display: grid;
            grid-template-columns: 1.1fr 0.9fr;
            gap: 40px;
            align-items: start;
        }

        /* Contenedores Base Estilizados */
        .carrito-box, .pedido-box {
            background: linear-gradient(135deg, #231932 0%, #170f22 100%);
            border: 1px solid rgba(188, 46, 126, 0.2);
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.3);
        }

        .carrito-box h2, .pedido-box h2 {
            font-family: 'Playfair Display', serif;
            color: #bc2e7e;
            margin-top: 0;
            margin-bottom: 20px;
            font-size: 1.8rem;
        }

        .pedido-box h3 {
            font-size: 1.1rem;
            color: #b3a7c4;
            margin-top: 25px;
            margin-bottom: 12px;
            border-bottom: 1px solid rgba(188, 46, 126, 0.15);
            padding-bottom: 5px;
        }

        /* Grupos de Formularios con Labels */
        .form-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
            margin-bottom: 15px;
        }

        .form-group-row {
            display: grid;
            grid-template-columns: 1fr auto;
            gap: 10px;
            align-items: flex-end;
        }

        .form-group label {
            font-size: 0.85rem;
            font-weight: 600;
            color: #b3a7c4;
            letter-spacing: 0.5px;
        }

        /* Inputs, Selects y Elementos de Control */
        .pedido-box input, .pedido-box select {
            font-family: 'Plus Jakarta Sans', sans-serif;
            padding: 12px 16px;
            border: 1px solid rgba(188, 46, 126, 0.4);
            border-radius: 8px;
            background-color: #2a1f35;
            color: white;
            font-size: 0.95rem;
            transition: all 0.3s ease;
            width: 100%;
            box-sizing: border-box;
        }

        .pedido-box input:focus, .pedido-box select:focus {
            outline: none;
            border-color: #ff69b4;
            box-shadow: 0 0 8px rgba(255, 105, 180, 0.4);
        }

        /* Total del Carrito */
        .total {
            font-size: 1.5rem;
            font-weight: 700;
            text-align: right;
            margin: 25px 0;
            color: #ffffff;
            border-top: 1px dashed rgba(188, 46, 126, 0.3);
            padding-top: 15px;
        }

        #descuentoAplicado {
            font-size: 0.9rem;
            color: #51cf66;
            margin-top: -5px;
            margin-bottom: 15px;
            font-weight: 600;
        }

        /* Sistema unificado de botones interactivos */
        .btn-action {
            font-family: 'Plus Jakarta Sans', sans-serif;
            padding: 12px 20px;
            font-size: 0.95rem;
            font-weight: 600;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
            border: none;
            box-sizing: border-box;
        }

        .btn-primary-cart {
            background: linear-gradient(135deg, #bc2e7e 0%, #a02267 100%);
            color: white;
            width: 100%;
            padding: 15px;
            font-size: 1.1rem;
            margin-top: 20px;
            box-shadow: 0 4px 15px rgba(188, 46, 126, 0.2);
        }

        .btn-primary-cart:hover {
            transform: translateY(-2px);
            background: linear-gradient(135deg, #ff69b4 0%, #bc2e7e 100%);
            box-shadow: 0 6px 20px rgba(188, 46, 126, 0.4);
        }

        .btn-secondary-cart {
            background: rgba(188, 46, 126, 0.15);
            color: #ffffff;
            border: 1px solid rgba(188, 46, 126, 0.4);
        }

        .btn-secondary-cart:hover {
            background: rgba(188, 46, 126, 0.3);
            border-color: #ff69b4;
        }

        .btn-danger-cart {
            background: transparent;
            color: #ff6b6b;
            border: 1px solid rgba(255, 107, 107, 0.4);
        }

        .btn-danger-cart:hover {
            background: rgba(255, 107, 107, 0.1);
            border-color: #ff6b6b;
        }

        /* Responsivo para pantallas medianas o móviles */
        @media (max-width: 968px) {
            .layout-carrito {
                grid-template-columns: 1fr;
                gap: 30px;
            }
        }
    </style>
</head>

<body>

<div class="navbar"></div>

<div class="container-carrito">
    <h1 class="titulo-seccion">Tu Compra</h1>

    <div class="layout-carrito">
        
        <div class="carrito-box">
            <h2>Productos agregados</h2>
            
            <div id="items"></div>

            <div class="total" id="total">
                Total: $0
            </div>

            <button class="btn-action btn-danger-cart" onclick="vaciar()">
                Vaciar carrito
            </button>
        </div>

        <div class="pedido-box">
            <h2>Confirmar Pedido</h2>

            <h3>Datos del cliente</h3>
            
            <div class="form-group">
                <label for="emailCliente">Correo Electrónico</label>
                <div class="form-group-row">
                    <input type="email" id="emailCliente" placeholder="ejemplo@correo.com">
                    <button class="btn-action btn-secondary-cart" onclick="buscarCliente()">
                        Buscar
                    </button>
                </div>
            </div>

            <div class="form-group">
                <label for="direccionSelect">Dirección de Entrega</label>
                <select id="direccionSelect">
                    <option value="">Seleccione un domicilio</option>
                </select>
            </div>

            <h3>Promociones</h3>

            <div class="form-group">
                <label for="cuponSelect">Cupón de Descuento</label>
                <div class="form-group-row">
                    <select id="cuponSelect">
                        <option value="">Seleccione un cupón</option>
                    </select>
                    <button class="btn-action btn-secondary-cart" onclick="aplicarCupon()">
                        Aplicar
                    </button>
                </div>
            </div>
            
            <div id="descuentoAplicado"></div>

            <h3>Método de Pago</h3>

            <div class="form-group">
                <label for="formaPago">Forma de pago</label>
                <select id="formaPago">
                    <option value="">Seleccione un método de pago</option>
                    <option value="EFECTIVO">Efectivo contra entrega</option>
                </select>
            </div>

            <button class="btn-action btn-primary-cart" onclick="confirmarPedido()">
                Confirmar Pedido Final
            </button>
        </div>

    </div>
</div>

<script src="auth.js"></script>
<script src="navbar.js"></script>
<script src="carrito.js"></script>

<script>
    // Configuración base de estilos para SweetAlerts global en la lógica del carrito
    const swalConfig = {
        confirmButtonColor: '#bc2e7e',
        background: '#231932',
        color: '#ffffff'
    };
</script>

</body>
</html>
