
<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>Carrito</title>

    <link rel="stylesheet" href="styles.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</head>

<body>

<div class="navbar"></div>

<div class="layout">

    <div></div>

    <div class="carrito">

        <h2>Productos agregados</h2>

        <div id="items"></div>

        <div class="total" id="total">
            Total: $0
        </div>

        <button class="btn-vaciar" onclick="vaciar()">
            Vaciar carrito
        </button>

    </div>

</div>
<div class="pedido-box">
    <div></div>
    <h2>Confirmar Pedido</h2>


    <h3>Datos del pedido</h3>
    <input
            type="email"
            id="emailCliente"
            placeholder="Ingrese su email"
    />

    <button class="btn-vaciar" onclick="buscarCliente()">
        Buscar cliente
    </button>

    <br><br>

    <select id="direccionSelect">
        <option value="">Seleccione un domicilio</option>
    </select>

    <br><br>

    <h3>Cupón de descuento</h3>

    <select id="cuponSelect">
        <option value="">
            Seleccione un cupón
        </option>
    </select>

    <button
            class="btn-vaciar"
            onclick="aplicarCupon()">
        Aplicar Cupón
    </button>

    <div id="descuentoAplicado"></div>

    <select id="formaPago">
        <option value="">Seleccione un metodo de pago</option>
        <option value="EFECTIVO">Efectivo contra entrega</option>
    </select>

    <br><br>

    <button class="btn-vaciar" onclick="confirmarPedido()">
        Confirmar Pedido
    </button>
</div>

<script src="auth.js"></script>
<script src="navbar.js"></script>
<script src="carrito.js"></script>

</body>
</html>
