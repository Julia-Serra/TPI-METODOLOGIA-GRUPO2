
<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>Carrito</title>

    <link rel="stylesheet" href="styles.css">
</head>

<body>

<div class="navbar">

    <div class="logo">
        🛒 Carrito
    </div>

    <div class="nav-links">

        <a href="index.html">
            <button>Inicio</button>
        </a>

        <a href="producto.html">
            <button>Productos</button>
        </a>

    </div>

</div>

<div class="layout">

    <div></div>

    <div class="carrito">

        <h2>Productos agregados</h2>

        <div id="items"></div>

        <div class="total" id="total">
            Total: $0
        </div>

        <button class="btn-vaciar" onclick="vaciar()">
            Vaciar carrito
        </button>

    </div>

</div>
<div>
    <h2>Confirmar Pedido</h2>

    <br><br>

    <h3>Datos del pedido</h3>
    <input
            type="email"
            id="emailCliente"
            placeholder="Ingrese su email"
    />

    <button onclick="buscarCliente()">
        Buscar cliente
    </button>

    <br><br>

    <label>Domicilio:</label>
    <select id="direccionSelect">
        <option value="">Seleccione un domicilio</option>
    </select>

    <br><br>

    <label>Forma de pago:</label>
    <select id="formaPago">
        <option value="">Seleccione</option>
        <option value="EFECTIVO">Efectivo contra entrega</option>
    </select>

    <br><br>

    <button onclick="confirmarPedido()">
        Confirmar Pedido
    </button>
</div>

<script src="carrito.js"></script>

</body>
</html>
