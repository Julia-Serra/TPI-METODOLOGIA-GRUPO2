<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>Panel Admin | BodyPaint</title>

    <link rel="stylesheet" href="styles.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</head>

<body>

<div class="navbar">

    <div class="logo">
        👑 Admin Panel
    </div>

    <div class="nav-links">

        <a href="index.html">
            <button>Inicio</button>
        </a>

        <a href="producto.html">
            <button>Productos</button>
        </a>

        <a href="pedidos.html">
            <button>Pedidos pendientes</button>
        </a>

    </div>

</div>

<div class="admin-page">

    <div class="admin-login" id="loginBox">

        <h1>Ingreso Administrador</h1>

        <input
                type="email"
                id="adminEmail"
                placeholder="Email admin"
        >

        <input
                type="password"
                id="adminPass"
                placeholder="Contraseña"
        >

        <button onclick="loginAdmin()">
            Ingresar
        </button>

        <p id="loginMsg"></p>

    </div>

    <div
            class="admin-panel hidden"
            id="adminPanel"
    >

        <h1>Crear Producto</h1>

        <form id="formProducto">

            <input
                    id="nombre"
                    placeholder="Nombre"
                    required
            >

            <input
                    id="marca"
                    placeholder="Marca"
                    required
            >

            <input
                    id="precio"
                    type="number"
                    placeholder="Precio"
                    required
            >

            <input
                    id="stock"
                    type="number"
                    placeholder="Stock"
                    required
            >

            <button type="submit">
                Crear Producto
            </button>
            <br>
        </form>

        <p id="msg"></p>
        

        <h2>Importar imagen a producto</h2>

        <input id="productoIdImagen" type="number" placeholder="ID del producto">

        <input id="imagenArchivo" type="file" accept="image/*">

        <button id="btnSubirImagen">Subir Imagen</button>

        <p id="msgImagen"></p>


        <h2>Acciones de Catálogo</h2>
        
        <input id="productoIdBaja" type="number" placeholder="ID del producto a dar de baja">
        
        <button id="btnDarDeBaja" onclick="solicitarBajaProducto()" style="background-color: #881c1c; color: white;">
            🗑️ Dar de Baja Producto
        </button>
        
        <p id="msgBaja"></p>

        <h2>Configurar stock mínimo</h2>

        <input id="productoIdStock" type="number" placeholder="ID producto">
        <input id="stockMinimo" type="number" placeholder="Stock mínimo">

        <button onclick="setStockMinimo()">
            Guardar stock mínimo
        </button>

        <p id="msgStock"></p>

    </div>

</div>

<script>

    const API = "http://localhost:8080";

    let token = "";

    function loginAdmin(){

        const email =
            document.getElementById("adminEmail").value;

        const pass =
            document.getElementById("adminPass").value;

        if(
            email === "admin@bodypaint.com"
            &&
            pass === "1234"
        ){

            token =
                "Basic " + btoa(email + ":" + pass);

            console.log(token);

            document
                .getElementById("loginBox")
                .classList.add("hidden");

            document
                .getElementById("adminPanel")
                .classList.remove("hidden");

        }else{

            document.getElementById("loginMsg")
                .innerHTML =
                "❌ Credenciales incorrectas";
        }
    }

    document
        .getElementById("formProducto")
        .addEventListener("submit", async e => {

            e.preventDefault();

            const producto = {

                nombre:
                    document.getElementById("nombre").value,

                marca:
                    document.getElementById("marca").value,

                precio:
                    parseFloat(
                        document.getElementById("precio").value
                    ),

                stock:
                    parseInt(
                        document.getElementById("stock").value
                    )
            };

            try{

                console.log(token);

                const res =
                    await fetch(`${API}/productos`,{

                        method:"POST",

                        headers:{
                            "Content-Type":"application/json",
                            "Authorization": token
                        },

                        body: JSON.stringify(producto)
                    });

                const data =
                    await res.json();

                console.log(data);

                if(!res.ok){

                    document.getElementById("msg")
                        .innerHTML =
                        "❌ " + (data.message || "Error al crear producto");

                    return;
                }

                document.getElementById("msg")
                    .innerHTML =
                    "✅ Producto creado correctamente";

                document.getElementById("formProducto")
                    .reset();

            }catch(e){

                console.log(e);

                document.getElementById("msg")
                    .innerHTML =
                    "❌ Error de conexión";
            }
        });


    document
    .getElementById("btnSubirImagen")
    .addEventListener("click", async () => {

        const id =
            document.getElementById("productoIdImagen").value;

        const archivo =
            document.getElementById("imagenArchivo").files[0];

        const msg =
            document.getElementById("msgImagen");

        if (!id || !archivo) {
            msg.innerHTML =
                "❌ Debe indicar ID y seleccionar una imagen";
            return;
        }

        const formData = new FormData();
        formData.append("archivo", archivo);

        try {

            const res =
                await fetch(`${API}/productos/${id}/imagen`, {
                    method: "POST",
                    headers: {
                        "Authorization": token
                    },
                    body: formData
                });

            if (!res.ok) {
                msg.innerHTML =
                    "❌ Error al subir imagen";
                return;
            }

            msg.innerHTML =
                "✅ Imagen subida correctamente";

        } catch (e) {

            msg.innerHTML =
                "❌ Error de conexión";
        }
    });


    // LÓGICA DE LA USER STORY: PETICIÓN DE BAJA LÓGICA
    async function solicitarBajaProducto() {
        const id = document.getElementById("productoIdBaja").value;
        const msg = document.getElementById("msgBaja");

        if (!id) {
            Swal.fire({
                title: 'Atención',
                text: 'Por favor, ingresá el ID del producto que querés dar de baja.',
                icon: 'warning',
                confirmButtonColor: '#bc2e7e',
                background: '#231932',
                color: '#ffffff'
            });
            return;
        }

        const result = await Swal.fire({
            title: '¿Confirmar baja?',
            text: `El producto con ID #${id} se deshabilitará del catálogo de ventas.`,
            icon: 'warning',
            showCancelButton: true,
            confirmButtonColor: '#bc2e7e',
            cancelButtonColor: '#444',
            confirmButtonText: 'Sí, dar de baja',
            cancelButtonText: 'Cancelar',
            background: '#231932',
            color: '#ffffff'
        });

        if (result.isConfirmed) {
            try {
                // CORRECCIÓN DE LA URL: Le agregamos /api antes de /productos
                const res = await fetch(`${API}/api/productos/${id}/baja`, {
                    method: "DELETE",
                    headers: {
                        "Authorization": token
                    }
                });

                // Si tu backend devuelve un String plano en vez de JSON en caso de error, 
                // primero manejamos la respuesta según su formato text/json para evitar romper el script
                const contentType = res.headers.get("content-type");
                let data;
                if (contentType && contentType.includes("application/json")) {
                    data = await res.json();
                } else {
                    data = { message: await res.text() };
                }

                if (!res.ok) {
                    let errorMsg = data.message || 'Error al procesar la baja';
                    
                    Swal.fire({
                        title: 'No se pudo dar de baja',
                        text: errorMsg,
                        icon: 'error',
                        confirmButtonColor: '#bc2e7e',
                        background: '#231932',
                        color: '#ffffff'
                    });
                    
                    msg.innerHTML = `❌ Error: ${errorMsg}`;
                    return;
                }

                // Éxito completo (Prueba de usuario 1 pasa)
                Swal.fire({
                    title: '¡Dado de baja!',
                    text: 'El producto se deshabilitó correctamente.',
                    icon: 'success',
                    confirmButtonColor: '#bc2e7e',
                    background: '#231932',
                    color: '#ffffff',
                    timer: 2000
                });

                msg.innerHTML = "✅ Producto dado de baja correctamente.";
                document.getElementById("productoIdBaja").value = "";

            } catch (e) {
                console.error(e);
                Swal.fire('Error', 'No hay conexión con el servidor', 'error');
                msg.innerHTML = "❌ Error de conexión con el servidor.";
            }
        }
    }
    async function setStockMinimo(){

        const id = document.getElementById("productoIdStock").value;
        const stockMin = document.getElementById("stockMinimo").value;

        if(!id || stockMin === ""){
            Swal.fire("Error","Datos incompletos","error");
            return;
        }

        const res = await fetch(`${API}/api/productos/${id}/stock-minimo`, {
            method:"PUT",
            headers:{
                "Content-Type":"application/json",
                "Authorization": token
            },
            body: JSON.stringify({
                stockMinimo: parseInt(stockMin)
            })
        });

        if(res.ok){
            Swal.fire("OK","Stock mínimo actualizado","success");
        }else{
            Swal.fire("Error","No se pudo actualizar","error");
        }
    }
</script>

</body>

</html>
