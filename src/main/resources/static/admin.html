<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>Panel Admin | BodyPaint</title>

    <link rel="stylesheet" href="styles.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</head>

<body>

<div class="navbar"></div>

<div class="admin-page" id="adminPanel">

    <section>
        <h1>Crear Producto</h1>
        <form id="formProducto">
            <input id="nombre" placeholder="Nombre" required>
            <input id="marca" placeholder="Marca" required>
            <input id="precio" type="number" placeholder="Precio" required>
            <input id="stock" type="number" placeholder="Stock" required>
            <button type="submit">Crear Producto</button>
        </form>
        <p id="msg"></p>
    </section>

    <section>
        <h2>Importar Imagen a Producto</h2>
        <input id="productoIdImagen" type="number" placeholder="ID del producto">
        <input id="imagenArchivo" type="file" accept="image/*">
        <button id="btnSubirImagen">Subir Imagen</button>
        <p id="msgImagen"></p>
    </section>

    <section>
        <h2>Configurar Stock Mínimo</h2>
        <input id="productoIdStockMinimo" type="number" placeholder="ID del producto">
        <input id="stockMinimoValor" type="number" placeholder="Stock mínimo" min="0" required>
        <button id="btnConfigurarStockMinimo">Configurar Stock Mínimo</button>
        <p id="msgStockMinimo"></p>
    </section>

    <section>
        <h2>Dar de Baja Producto</h2>
        <input id="productoIdBaja" type="number" placeholder="ID del producto a dar de baja">
        <button id="btnDarDeBaja" onclick="solicitarBajaProducto()" style="background-color: #881c1c; color: white;">
            🗑️ Dar de Baja Producto
        </button>
        <p id="msgBaja"></p>
    </section>

</div>

<script src="auth.js"></script>
<script src="navbar.js"></script>
<script>

    // Verificar que sea admin
    requireRole('ADMIN');

    const API = "http://localhost:8080";

    let token = getCurrentToken();

    document
        .getElementById("formProducto")
        .addEventListener("submit", async e => {

            e.preventDefault();

            const producto = {

                nombre:
                    document.getElementById("nombre").value,

                marca:
                    document.getElementById("marca").value,

                precio:
                    parseFloat(
                        document.getElementById("precio").value
                    ),

                stock:
                    parseInt(
                        document.getElementById("stock").value
                    )
            };

            try{

                console.log(token);

                const res =
                    await fetch(`${API}/productos`,{

                        method:"POST",

                        headers:{
                            "Content-Type":"application/json",
                            "Authorization": token
                        },

                        body: JSON.stringify(producto)
                    });

                const data =
                    await res.json();

                console.log(data);

                if(!res.ok){

                    document.getElementById("msg")
                        .innerHTML =
                        "❌ " + (data.message || "Error al crear producto");

                    return;
                }

                document.getElementById("msg")
                    .innerHTML =
                    "✅ Producto creado correctamente";

                document.getElementById("formProducto")
                    .reset();

            }catch(e){

                console.log(e);

                document.getElementById("msg")
                    .innerHTML =
                    "❌ Error de conexión";
            }
        });


    document
    .getElementById("btnSubirImagen")
    .addEventListener("click", async () => {

        const id =
            document.getElementById("productoIdImagen").value;

        const archivo =
            document.getElementById("imagenArchivo").files[0];

        const msg =
            document.getElementById("msgImagen");

        if (!id || !archivo) {
            msg.innerHTML =
                "❌ Debe indicar ID y seleccionar una imagen";
            return;
        }

        const formData = new FormData();
        formData.append("archivo", archivo);

        try {

            const res =
                await fetch(`${API}/productos/${id}/imagen`, {
                    method: "POST",
                    headers: {
                        "Authorization": token
                    },
                    body: formData
                });

            const data = await res.json();

            if (!res.ok) {
                msg.innerHTML =
                    "❌ " + (data.message || "Error al subir imagen");
                return;
            }

            msg.innerHTML =
                "✅ Imagen subida correctamente";

            document.getElementById("productoIdImagen").value = "";
            document.getElementById("imagenArchivo").value = "";

        } catch (e) {
            console.error(e);
            msg.innerHTML =
                "❌ Error de conexión: " + e.message;
        }
    });


    document
    .getElementById("btnConfigurarStockMinimo")
    .addEventListener("click", async () => {

        const id =
            document.getElementById("productoIdStockMinimo").value;

        const stockMinimo =
            document.getElementById("stockMinimoValor").value;

        const msg =
            document.getElementById("msgStockMinimo");

        if (!id || stockMinimo === "") {
            msg.innerHTML =
                "❌ Debe indicar ID del producto y stock mínimo";
            return;
        }

        const request = {
            stockMinimo: parseInt(stockMinimo)
        };

        try {

            const res =
                await fetch(`${API}/api/productos/${id}/stock-minimo`, {
                    method: "PUT",
                    headers: {
                        "Content-Type": "application/json",
                        "Authorization": token
                    },
                    body: JSON.stringify(request)
                });

            const data = await res.json();

            if (!res.ok) {
                msg.innerHTML =
                    "❌ " + (data.message || "Error al configurar stock mínimo");
                return;
            }

            msg.innerHTML =
                "✅ Stock mínimo configurado correctamente";

            document.getElementById("productoIdStockMinimo").value = "";
            document.getElementById("stockMinimoValor").value = "";

        } catch (e) {
            console.error(e);
            msg.innerHTML =
                "❌ Error de conexión: " + e.message;
        }
    });


    // LÓGICA DE LA USER STORY: PETICIÓN DE BAJA LÓGICA
    async function solicitarBajaProducto() {
        const id = document.getElementById("productoIdBaja").value;
        const msg = document.getElementById("msgBaja");

        if (!id) {
            Swal.fire({
                title: 'Atención',
                text: 'Por favor, ingresá el ID del producto que querés dar de baja.',
                icon: 'warning',
                confirmButtonColor: '#bc2e7e',
                background: '#231932',
                color: '#ffffff'
            });
            return;
        }

        const result = await Swal.fire({
            title: '¿Confirmar baja?',
            text: `El producto con ID #${id} se deshabilitará del catálogo de ventas.`,
            icon: 'warning',
            showCancelButton: true,
            confirmButtonColor: '#bc2e7e',
            cancelButtonColor: '#444',
            confirmButtonText: 'Sí, dar de baja',
            cancelButtonText: 'Cancelar',
            background: '#231932',
            color: '#ffffff'
        });

        if (result.isConfirmed) {
            try {
                // CORRECCIÓN DE LA URL: Le agregamos /api antes de /productos
                const res = await fetch(`${API}/api/productos/${id}/baja`, {
                    method: "DELETE",
                    headers: {
                        "Authorization": token
                    }
                });

                // Si tu backend devuelve un String plano en vez de JSON en caso de error, 
                // primero manejamos la respuesta según su formato text/json para evitar romper el script
                const contentType = res.headers.get("content-type");
                let data;
                if (contentType && contentType.includes("application/json")) {
                    data = await res.json();
                } else {
                    data = { message: await res.text() };
                }

                if (!res.ok) {
                    let errorMsg = data.message || 'Error al procesar la baja';
                    
                    Swal.fire({
                        title: 'No se pudo dar de baja',
                        text: errorMsg,
                        icon: 'error',
                        confirmButtonColor: '#bc2e7e',
                        background: '#231932',
                        color: '#ffffff'
                    });
                    
                    msg.innerHTML = `❌ Error: ${errorMsg}`;
                    return;
                }

                // Éxito completo (Prueba de usuario 1 pasa)
                Swal.fire({
                    title: '¡Dado de baja!',
                    text: 'El producto se deshabilitó correctamente.',
                    icon: 'success',
                    confirmButtonColor: '#bc2e7e',
                    background: '#231932',
                    color: '#ffffff',
                    timer: 2000
                });

                msg.innerHTML = "✅ Producto dado de baja correctamente.";
                document.getElementById("productoIdBaja").value = "";

            } catch (e) {
                console.error(e);
                Swal.fire('Error', 'No hay conexión con el servidor', 'error');
                msg.innerHTML = "❌ Error de conexión con el servidor.";
            }
        }
    }

</script>

</body>

</html>
