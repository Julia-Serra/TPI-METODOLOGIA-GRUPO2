<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>Panel Admin | BodyPaint</title>

    <link rel="stylesheet" href="styles.css">
</head>

<body>

<div class="navbar">

    <div class="logo">
        👑 Admin Panel
    </div>

    <div class="nav-links">

        <a href="index.html">
            <button>Inicio</button>
        </a>

        <a href="producto.html">
            <button>Productos</button>
        </a>

        <a href="pedidos.html">
            <button>Pedidos pendientes</button>
        </a>

    </div>

</div>

<div class="admin-page">

    <div class="admin-login" id="loginBox">

        <h1>Ingreso Administrador</h1>

        <input
                type="email"
                id="adminEmail"
                placeholder="Email admin"
        >

        <input
                type="password"
                id="adminPass"
                placeholder="Contraseña"
        >

        <button onclick="loginAdmin()">
            Ingresar
        </button>

        <p id="loginMsg"></p>

    </div>

    <div
            class="admin-panel hidden"
            id="adminPanel"
    >

        <h1>Crear Producto</h1>

        <form id="formProducto">

            <input
                    id="nombre"
                    placeholder="Nombre"
                    required
            >

            <input
                    id="marca"
                    placeholder="Marca"
                    required
            >

            <input
                    id="precio"
                    type="number"
                    placeholder="Precio"
                    required
            >

            <input
                    id="stock"
                    type="number"
                    placeholder="Stock"
                    required
            >

            <button type="submit">
                Crear Producto
                
            </button>
            <br>
        </form>

        <p id="msg"></p>
        

        <h2>  Importar imagen a producto</h2>

        <input id="productoIdImagen" type="number" placeholder="ID del producto">

        <input id="imagenArchivo" type="file" accept="image/*">

        <button id="btnSubirImagen">Subir Imagen</button>

        <p id="msgImagen"></p>

    </div>

</div>

<script>

    const API = "http://localhost:8080";

    let token = "";

    function loginAdmin(){

        const email =
            document.getElementById("adminEmail").value;

        const pass =
            document.getElementById("adminPass").value;

        if(
            email === "admin@bodypaint.com"
            &&
            pass === "1234"
        ){

            token =
                "Basic " + btoa(email + ":" + pass);

            document
                .getElementById("loginBox")
                .classList.add("hidden");

            document
                .getElementById("adminPanel")
                .classList.remove("hidden");

        }else{

            document.getElementById("loginMsg")
                .innerHTML =
                "❌ Credenciales incorrectas";
        }
    }

    document
        .getElementById("formProducto")
        .addEventListener("submit", async e => {

            e.preventDefault();

            const producto = {

                nombre:
                    document.getElementById("nombre").value,

                marca:
                    document.getElementById("marca").value,

                precio:
                    parseFloat(
                        document.getElementById("precio").value
                    ),

                stock:
                    parseInt(
                        document.getElementById("stock").value
                    )
            };

            try{

                const res =
                    await fetch(`${API}/productos`,{

                        method:"POST",

                        headers:{
                            "Content-Type":"application/json",
                            "Authorization": token
                        },

                        body: JSON.stringify(producto)
                    });

                const data =
                    await res.json();

                if(!res.ok){

                    document.getElementById("msg")
                        .innerHTML =
                        "❌ Error al crear producto";

                    return;
                }

                document.getElementById("msg")
                    .innerHTML =
                    "✅ Producto creado correctamente";

                document.getElementById("formProducto")
                    .reset();

            }catch(e){

                document.getElementById("msg")
                    .innerHTML =
                    "❌ Error de conexión";
            }
        });

        document
    .getElementById("btnSubirImagen")
    .addEventListener("click", async () => {

        const id =
            document.getElementById("productoIdImagen").value;

        const archivo =
            document.getElementById("imagenArchivo").files[0];

        const msg =
            document.getElementById("msgImagen");

        if (!id || !archivo) {
            msg.innerHTML =
                "❌ Debe indicar ID y seleccionar una imagen";
            return;
        }

        const formData = new FormData();
        formData.append("archivo", archivo);

        try {

            const res =
                await fetch(`${API}/productos/${id}/imagen`, {
                    method: "POST",
                    headers: {
                        "Authorization": token
                    },
                    body: formData
                });

            if (!res.ok) {
                msg.innerHTML =
                    "❌ Error al subir imagen";
                return;
            }

            msg.innerHTML =
                "✅ Imagen subida correctamente";

        } catch (e) {

            msg.innerHTML =
                "❌ Error de conexión";
        }
    });

</script>

</body>

</html>
