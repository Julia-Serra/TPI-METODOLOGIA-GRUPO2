<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Registro</title>
    <style>
        body { font-family: Arial; background:#f4f6f8; }
        .container { width:400px; margin:50px auto; background:white; padding:20px; border-radius:10px; }
        input, button { width:100%; padding:10px; margin:5px 0; }
        button { background:#28a745; color:white; border:none; }
        #msg { margin-top:10px; font-weight:bold; }
    </style>
</head>
<body>

<div class="container">
    <h2>Registro Cliente</h2>

    <form id="formCliente">
        <input id="nombre" placeholder="Nombre" required>
        <input id="apellido" placeholder="Apellido" required>
        <input id="email" placeholder="Email" required>
        <input id="pais" placeholder="Pais" required>
        <input id="provincia" placeholder="Provincia" required>
        <input id="localidad" placeholder="Localidad" required>
        <input id="calle" placeholder="Calle" required>
        <input id="numero" placeholder="Numero" required>

        <button type="submit">Registrar</button>
    </form>

    <p id="msg"></p>
</div>

<script>
    document.getElementById("formCliente").addEventListener("submit", async e => {
        e.preventDefault();

        const msg = document.getElementById("msg");

        const cliente = {
            nombre: nombre.value,
            apellido: apellido.value,
            email: email.value,
            pais: pais.value,
            provincia: provincia.value,
            localidad: localidad.value,
            calle: calle.value,
            numero: numero.value
        };

        try {
            const res = await fetch("http://localhost:8080/clientes", {
                method: "POST",
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify(cliente)
            });

            const data = await res.json();

            if (!res.ok) {
                msg.innerText = "❌ " + (data.errors ? data.errors.join(", ") : data.message);
                return;
            }

            msg.innerText = "✅ Cliente registrado correctamente";
            formCliente.reset();

        } catch (err) {
            msg.innerText = "❌ Error de conexión";
        }
    });
</script>

</body>
</html>
