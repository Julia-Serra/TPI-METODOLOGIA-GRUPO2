<!-- registro.html -->

<!DOCTYPE html>
<html lang="es">

<head>

    <meta charset="UTF-8">

    <title>
        Registro
    </title>

    <link rel="stylesheet" href="styles.css">

    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

</head>

<body>

<div class="container-form">

    <h2>
        Registro Cliente
    </h2>

    <form id="formCliente">

        <input id="nombre" placeholder="Nombre" required>

        <input id="apellido" placeholder="Apellido" required>

        <input id="email" placeholder="Email" required>

        <input id="pais" placeholder="Pais" required>

        <input id="provincia" placeholder="Provincia" required>

        <input id="localidad" placeholder="Localidad" required>

        <input id="calle" placeholder="Calle" required>

        <input id="numero" placeholder="Numero" required>

        <button type="submit">
            Registrarse
        </button>

    </form>
    <hr>

    <h3>Agregar otro domicilio (opcional)</h3>

    <input id="emailBuscar" placeholder="Email del cliente">

    <input id="pais2" placeholder="País">
    <input id="provincia2" placeholder="Provincia">
    <input id="localidad2" placeholder="Localidad">
    <input id="calle2" placeholder="Calle">
    <input id="numero2" placeholder="Número">

    <button type="button" onclick="agregarDomicilio()">
        Agregar domicilio
    </button>

</div>

<script>

    document.getElementById("formCliente")
    .addEventListener("submit", async e => {

        e.preventDefault();

        const nombre = document.getElementById("nombre").value.trim();
        const apellido = document.getElementById("apellido").value.trim();
        const email = document.getElementById("email").value.trim();
        const pais = document.getElementById("pais").value.trim();
        const provincia = document.getElementById("provincia").value.trim();
        const localidad = document.getElementById("localidad").value.trim();
        const calle = document.getElementById("calle").value.trim();
        const numero = document.getElementById("numero").value.trim();

        const soloLetras = /^[A-Za-zÁÉÍÓÚáéíóúñÑ\s]+$/;
        const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;

        if(!soloLetras.test(nombre)) return mostrarError("Nombre inválido");
        if(!soloLetras.test(apellido)) return mostrarError("Apellido inválido");
        if(!soloLetras.test(pais)) return mostrarError("País inválido");
        if(!soloLetras.test(provincia)) return mostrarError("Provincia inválida");
        if(!soloLetras.test(localidad)) return mostrarError("Localidad inválida");

        if(!emailRegex.test(email)) return mostrarError("Email inválido");

        const cliente = {
            nombre,
            apellido,
            email,
            pais,
            provincia,
            localidad,
            calle,
            numero
        };

        try{

            const res = await fetch("http://localhost:8080/clientes", {
                method:"POST",
                headers:{
                    "Content-Type":"application/json"
                },
                body: JSON.stringify(cliente)
            });

            const data = await res.json();

            if(!res.ok){
                return mostrarError(data.message || "Error");
            }

            Swal.fire({
                title:'Registro exitoso',
                icon:'success'
            });

            document.getElementById("formCliente").reset();

        }catch(e){
            mostrarError("Error de conexión");
        }
    });

    function mostrarError(msg){
        Swal.fire({
            icon:'error',
            text:msg
        });
    }
    async function agregarDomicilio(){

        const email = document.getElementById("emailBuscar").value.trim();
        const safeEmail = encodeURIComponent(email);

        const domicilio = {
            pais: document.getElementById("pais2").value.trim(),
            provincia: document.getElementById("provincia2").value.trim(),
            localidad: document.getElementById("localidad2").value.trim(),
            calle: document.getElementById("calle2").value.trim(),
            numero: document.getElementById("numero2").value.trim()
        };

        if(!email){
            return mostrarError("Ingresá el email");
        }

        if(Object.values(domicilio).some(v => !v)){
            return mostrarError("Faltan datos del domicilio");
        }

        try{

            const res = await fetch(
                `http://localhost:8080/clientes/${safeEmail}/domicilios`,
                {
                    method:"POST",
                    headers:{
                        "Content-Type":"application/json"
                    },
                    body: JSON.stringify(domicilio)
                }
            );

            if(!res.ok){
                const err = await res.text();
                return mostrarError(err);
            }

            Swal.fire({
                icon:'success',
                text:'Domicilio agregado'
            });

        }catch(e){
            mostrarError("Error de conexión");
        }
}
</script>

</body>
</html>
