<!-- registro.html -->

<!DOCTYPE html>
<html lang="es">

<head>

    <meta charset="UTF-8">

    <title>
        Registro
    </title>

    <link rel="stylesheet" href="styles.css">

    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

</head>

<body>

<div class="container-form">

    <h2>
        Registro Cliente
    </h2>

    <form id="formCliente">

        <input id="nombre" placeholder="Nombre" required>

        <input id="apellido" placeholder="Apellido" required>

        <input id="email" placeholder="Email" required>

        <input id="pais" placeholder="Pais" required>

        <input id="provincia" placeholder="Provincia" required>

        <input id="localidad" placeholder="Localidad" required>

        <input id="calle" placeholder="Calle" required>

        <input id="numero" placeholder="Numero" required>

        <button type="submit">
            Registrarse
        </button>

    </form>

</div>

<script>

    document.getElementById("formCliente")
    .addEventListener("submit", async e => {

        e.preventDefault();

        const soloLetras =
            /^[A-Za-zÁÉÍÓÚáéíóúñÑ\s]+$/;

        const emailRegex =
            /^[^\s@]+@[^\s@]+\.[^\s@]+$/;

        if(!soloLetras.test(nombre.value)){

            mostrarError("Nombre inválido");
            return;
        }

        if(!soloLetras.test(apellido.value)){

            mostrarError("Apellido inválido");
            return;
        }

        if(!soloLetras.test(pais.value)){

            mostrarError("País inválido");
            return;
        }

        if(!soloLetras.test(provincia.value)){

            mostrarError("Provincia inválida");
            return;
        }

        if(!soloLetras.test(localidad.value)){

            mostrarError("Localidad inválida");
            return;
        }

        if(!emailRegex.test(email.value)){

            mostrarError("Email inválido");
            return;
        }

        const cliente = {

            nombre: nombre.value,

            apellido: apellido.value,

            email: email.value,

            pais: pais.value,

            provincia: provincia.value,

            localidad: localidad.value,

            calle: calle.value,

            numero: numero.value
        };

        try{

            const res =
                await fetch(
                    "http://localhost:8080/clientes",
                    {
                        method:"POST",
                        headers:{
                            "Content-Type":"application/json"
                        },
                        body:JSON.stringify(cliente)
                    }
                );

            const data = await res.json();

            if(!res.ok){

                mostrarError(
                    data.errors
                        ? data.errors.join(", ")
                        : data.message
                );

                return;
            }

            Swal.fire({
                title:'Registro exitoso',
                text:'Cliente registrado correctamente',
                icon:'success',
                confirmButtonColor:'#bc2e7e',
                background:'#231932',
                color:'#ffffff'
            });

            formCliente.reset();

        }catch(err){

            mostrarError("Error de conexión");
        }
    });

    function mostrarError(msg){

        Swal.fire({
            title:'Error',
            text:msg,
            icon:'error',
            confirmButtonColor:'#bc2e7e',
            background:'#231932',
            color:'#ffffff'
        });
    }

</script>

</body>
</html>
