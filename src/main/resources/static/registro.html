<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>
    <h2>Registro Cliente</h2>

    <form id="formCliente">
        <input placeholder="Nombre" id="nombre"><br>
        <input placeholder="Apellido" id="apellido"><br>
        <input placeholder="Email" id="email"><br>
        <input placeholder="Pais" id="pais"><br>
        <input placeholder="Provincia" id="provincia"><br>
        <input placeholder="Localidad" id="localidad"><br>
        <input placeholder="Calle" id="calle"><br>
        <input placeholder="Numero" id="numero"><br>
        <button type="submit">Registrar</button>
    </form>

    <script>
        document.getElementById("formCliente").addEventListener("submit", function (e) {
            e.preventDefault();

            fetch("http://localhost:8080/clientes", {
                method: "POST",
                headers: {
                    "Content-Type": "application/json",
                    "Authorization": "Basic " + btoa("cliente@bodypaint.com:1234")
                },
                body: JSON.stringify({
                    nombre: nombre.value,
                    apellido: apellido.value,
                    email: email.value,
                    pais: pais.value,
                    provincia: provincia.value,
                    localidad: localidad.value,
                    calle: calle.value,
                    numero: numero.value
                })
            })
                .then(r => r.json())
                .then(d => alert("Cliente registrado"));
        });
    </script>

</body>

</html>
