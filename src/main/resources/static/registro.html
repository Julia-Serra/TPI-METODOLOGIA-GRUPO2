
<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>Registro</title>

    <link rel="stylesheet" href="styles.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</head>

<body>

<div class="container-form">

    <h2>
        Registro Cliente
    </h2>

    <form id="formCliente">

        <input id="nombre" placeholder="Nombre" required>

        <input id="apellido" placeholder="Apellido" required>

        <input id="email" placeholder="Email" required>

        <input id="pais" placeholder="Pais" required>

        <input id="provincia" placeholder="Provincia" required>

        <input id="localidad" placeholder="Localidad" required>

        <input id="calle" placeholder="Calle" required>

        <input id="numero" placeholder="Numero" required>

        <button type="submit">
            Registrarse
        </button>

    </form>

    <p id="msg"></p>

</div>

<script>

    document.getElementById("formCliente")
    .addEventListener("submit", async e => {

        e.preventDefault();

        const msg =
            document.getElementById("msg");

        const cliente = {

            nombre:nombre.value,
            apellido:apellido.value,
            email:email.value,
            pais:pais.value,
            provincia:provincia.value,
            localidad:localidad.value,
            calle:calle.value,
            numero:numero.value
        };

        try{

            const res =
                await fetch(
                    "http://localhost:8080/clientes",
                    {
                        method:"POST",
                        headers:{
                            "Content-Type":"application/json"
                        },
                        body:JSON.stringify(cliente)
                    }
                );

            if(!res.ok){
                throw new Error();
            }

            msg.innerText =
                "✅ Cliente registrado";

            formCliente.reset();

        }catch{

            msg.innerText =
                "❌ Error";
        }
    });

</script>

</body>
</html>
