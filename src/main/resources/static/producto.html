<!-- producto.html -->

<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>Productos</title>

    <link rel="stylesheet" href="styles.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</head>

<body>

<div class="navbar">

    <div class="logo">
        🎨 BodyPaint
    </div>

    <div class="nav-links">

        <a href="index.html">
            <button>Inicio</button>
        </a>

        <a href="carrito.html">
            <button>Carrito</button>
        </a>

    </div>

</div>

<div class="container">

    <h1 class="titulo">
        Productos
    </h1>

    <div class="filtros">

        <input
                type="text"
                id="filtroNombre"
                placeholder="Buscar por nombre"
        >

        <input
                type="text"
                id="filtroMarca"
                placeholder="Buscar por marca"
        >

        <input
                type="number"
                id="precioMin"
                placeholder="Precio mínimo"
        >

        <input
                type="number"
                id="precioMax"
                placeholder="Precio máximo"
        >

        <input
                type="number"
                id="stockMin"
                placeholder="Stock mínimo"
        >

        <input
                type="number"
                id="stockMax"
                placeholder="Stock máximo"
        >

        <button onclick="filtrarProductos()">
            Filtrar
        </button>

    </div>

    <div
            class="productos-grid"
            id="productosGrid"
    ></div>

</div>

<script src="producto.js"></script>

</body>
</html>
