<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Productos</title>
    <style>
        body { font-family: Arial; background:#f4f6f8; }
        .container { width:400px; margin:50px auto; background:white; padding:20px; border-radius:10px; }
        li { margin:5px 0; padding:10px; background:#eee; }
    </style>
</head>
<body>

<div class="container">
    <h2>Productos</h2>
    <ul id="lista"></ul>
</div>

<script>
    fetch("http://localhost:8080/productos")
    .then(res => res.json())
    .then(data => {
        const ul = document.getElementById("lista");

        data.data.forEach(p => {
            ul.innerHTML += `<li>
                <b>${p.nombre}</b><br>
                ${p.marca}<br>
                $${p.precio}
            </li>`;
        });
    })
    .catch(() => alert("Error al cargar productos"));
</script>

</body>
</html>
