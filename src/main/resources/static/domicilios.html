<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Mis Domicilios | BodyPaint</title>
    <link rel="stylesheet" href="styles.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</head>
<body>

<div class="navbar"></div>

<div class="container" style="max-width: 1000px; margin: 40px auto;">
    <h1 class="titulo">📍 Mis Domicilios</h1>

    <div class="item" style="padding: 30px; margin-top: 20px;">

        <h2 style="color: #bc2e7e; margin-bottom: 20px; font-size: 1.5rem;">Agregar Nuevo Domicilio</h2>

        <form id="domicilioForm" style="display: flex; flex-direction: column; gap: 15px; background-color: #2a1f35; padding: 20px; border-radius: 8px; margin-bottom: 40px; border: 1px solid rgba(188, 46, 126, 0.15);">

            <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 12px;">
                <input type="text" id="pais" placeholder="País" required style="padding: 12px; border: 1px solid rgba(188, 46, 126, 0.3); border-radius: 6px; background-color: #1a1520; color: white;">
                <input type="text" id="provincia" placeholder="Provincia" required style="padding: 12px; border: 1px solid rgba(188, 46, 126, 0.3); border-radius: 6px; background-color: #1a1520; color: white;">
                <input type="text" id="localidad" placeholder="Localidad/Ciudad" required style="padding: 12px; border: 1px solid rgba(188, 46, 126, 0.3); border-radius: 6px; background-color: #1a1520; color: white;">
            </div>

            <div style="display: grid; grid-template-columns: 3fr 1fr; gap: 12px;">
                <input type="text" id="calle" placeholder="Calle" required style="padding: 12px; border: 1px solid rgba(188, 46, 126, 0.3); border-radius: 6px; background-color: #1a1520; color: white;">
                <input type="text" id="numero" placeholder="Número" required style="padding: 12px; border: 1px solid rgba(188, 46, 126, 0.3); border-radius: 6px; background-color: #1a1520; color: white;">
            </div>

            <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 12px;">
                <input type="text" id="piso" placeholder="Piso (opcional)" style="padding: 12px; border: 1px solid rgba(188, 46, 126, 0.3); border-radius: 6px; background-color: #1a1520; color: white;">
                <input type="text" id="departamento" placeholder="Departamento (opcional)" style="padding: 12px; border: 1px solid rgba(188, 46, 126, 0.3); border-radius: 6px; background-color: #1a1520; color: white;">
            </div>

            <button type="submit" class="btn-sumar" style="margin: 10px 0 0 0; padding: 14px; width: 100%; border-radius: 6px; font-size: 1rem;">
                ➕ Agregar Domicilio
            </button>
        </form>

        <h2 style="color: #ffffff; margin-bottom: 20px; font-size: 1.5rem; border-bottom: 1px solid rgba(255,255,255,0.05); padding-bottom: 10px;">Mis Domicilios Guardados</h2>

        <div id="domiciliosContainer" class="productos-grid" style="gap: 20px;">
            <p class="empty" style="grid-column: 1/-1;">Cargando domicilios...</p>
        </div>

    </div>
</div>

<script src="auth.js"></script>
<script src="navbar.js"></script>
<script>
    requireRole('CLIENTE');

    const API = "http://localhost:8080";
    let token = getCurrentToken();
    const email = getCurrentEmail();

    // Configuración estética centralizada (Identidad de la app)
    const swalConfig = {
        confirmButtonColor: '#bc2e7e',
        cancelButtonColor: '#444444',
        background: '#231932',
        color: '#ffffff'
    };

    // Cargar domicilios desde el Service de Spring Boot
    async function loadDomicilios() {
        try {
            const res = await fetch(`${API}/clientes/email/${email}`, {
                headers: {
                    "Authorization": token
                }
            });

            if (!res.ok) throw new Error('Error al recuperar datos de cliente');

            const data = await res.json();
            const cliente = data.data;
            const domicilios = cliente.direcciones || [];
            const container = document.getElementById('domiciliosContainer');

            if (!domicilios || domicilios.length === 0) {
                container.innerHTML = `
                    <p class="empty" style="grid-column: 1/-1; text-align: center; padding: 20px 0;">
                        No tenés domicilios registrados aún 📍
                    </p>
                `;
                return;
            }

            let html = '';
            domicilios.forEach((dom, index) => {
                html += `
                    <div class="item" style="margin: 0; background-color: #2a1f35; border-left: 4px solid #bc2e7e; display: flex; flex-direction: column; justify-content: space-between;">
                        <div>
                            <h3 style="margin: 0 0 8px 0; color: #ffffff; font-size: 1.2rem;">${dom.calle} ${dom.numero}</h3>
                            <p style="margin: 5px 0; color: #bc2e7e; font-weight: 600; font-size: 0.95rem;">📍 ${dom.localidad}, ${dom.provincia}</p>
                            <p style="margin: 5px 0; color: #b3a7c4; font-size: 0.9rem;">${dom.pais}</p>
                            
                            ${dom.piso || dom.departamento ? `
                                <div style="margin-top: 10px; background: rgba(255,255,255,0.03); padding: 6px 10px; border-radius: 4px; font-size: 0.85rem; color: #b3a7c4; display: inline-block;">
                                    ${dom.piso ? `Piso: ${dom.piso}` : ''} ${dom.departamento ? `| Depto: ${dom.departamento}` : ''}
                                </div>
                            ` : ''}
                        </div>
                        
                        <div style="margin-top: 20px; border-top: 1px solid rgba(255,255,255,0.05); padding-top: 12px; display: flex; justify-content: flex-end;">
                            <button onclick="deleteDomicilio(${index})" class="btn-eliminar" style="margin: 0; padding: 6px 14px; font-size: 0.85rem;">
                                🗑️ Eliminar
                            </button>
                        </div>
                    </div>
                `;
            });
            container.innerHTML = html;

        } catch (e) {
            console.error(e);
            document.getElementById('domiciliosContainer').innerHTML = `
                <p class="empty" style="grid-column: 1/-1; color: #ef4444;">
                    Falla de comunicación al mapear los domicilios.
                </p>
            `;
        }
    }

    // Guardar nuevo domicilio mediante POST
    document.getElementById('domicilioForm').addEventListener('submit', async (e) => {
        e.preventDefault();

        const direccion = {
            pais: document.getElementById('pais').value.trim(),
            provincia: document.getElementById('provincia').value.trim(),
            localidad: document.getElementById('localidad').value.trim(),
            calle: document.getElementById('calle').value.trim(),
            numero: document.getElementById('numero').value.trim(),
            piso: document.getElementById('piso').value.trim() || null,
            departamento: document.getElementById('departamento').value.trim() || null
        };

        // Bloqueo con SweetAlert mientras procesa el Request
        Swal.fire({
            ...swalConfig,
            title: 'Registrando dirección...',
            text: 'Guardando nueva localización en tu cuenta.',
            allowOutsideClick: false,
            didOpen: () => {
                Swal.showLoading();
            }
        });

        try {
            const res = await fetch(`${API}/clientes/${email}/direcciones`, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'Authorization': token
                },
                body: JSON.stringify(direccion)
            });

            if (!res.ok) {
                const err = await res.json();
                throw new Error(err.message || 'No se pudo dar de alta la dirección.');
            }

            Swal.fire({
                ...swalConfig,
                icon: 'success',
                title: 'Domicilio añadido',
                text: 'La locación se registró de manera exitosa.',
                timer: 1500,
                showConfirmButton: false
            });

            document.getElementById('domicilioForm').reset();
            loadDomicilios();

        } catch (e) {
            console.error(e);
            Swal.fire({
                ...swalConfig,
                icon: 'error',
                title: 'Error de validación',
                text: e.message
            });
        }
    });

    // Eliminar domicilio de la colección
    async function deleteDomicilio(index) {
        const result = await Swal.fire({
            ...swalConfig,
            title: '¿Eliminar domicilio?',
            text: 'Esta locación se removerá de tu lista de envíos.',
            icon: 'warning',
            showCancelButton: true,
            confirmButtonColor: '#ef4444', // Color destructivo controlado
            confirmButtonText: 'Sí, borrar',
            cancelButtonText: 'Mantener'
        });

        if (!result.isConfirmed) return;

        Swal.fire({
            ...swalConfig,
            title: 'Modificando registros...',
            allowOutsideClick: false,
            didOpen: () => {
                Swal.showLoading();
            }
        });

        try {
            const res = await fetch(`${API}/clientes/email/${email}`, {
                headers: { "Authorization": token }
            });
            const data = await res.json();
            const cliente = data.data;
            const domicilios = cliente.direcciones || [];

            if (domicilios.length > index) {
                // Aquí podés enganchar un DELETE específico si lo creás en tu backend, 
                // por ahora refresca la lista respetando la lógica de tu controlador.
                Swal.close();
                loadDomicilios();
            }
        } catch (e) {
            console.error(e);
            Swal.fire({
                ...swalConfig,
                icon: 'error',
                title: 'Falla crítica',
                text: 'No se pudo remover el domicilio.'
            });
        }
    }

    // Ejecución inicial diferida
    loadDomicilios();
</script>

</body>
</html>
