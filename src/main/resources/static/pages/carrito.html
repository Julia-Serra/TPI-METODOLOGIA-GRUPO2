
<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>Carrito</title>

    <link rel="stylesheet" href="../css/styles.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</head>
<script src="/js/core/auth.js"></script>
<script src="/js/core/navbar.js"></script>

<body>

<div class="navbar">
    <div class="logo">🎨 BodyPaint</div>
    <div id="navbar" class="nav-links"></div>
</div>

<script>
requireLogin(["ROLE_CLIENTE"]);
</script>
<script src="/js/pages/carrito.js"></script>


<div class="layout">

    <div></div>

    <div class="carrito">

        <h2>Productos agregados</h2>

        <div id="items"></div>

        <div class="total" id="total">
            Total: $0
        </div>

        <button class="btn-vaciar" onclick="vaciar()">
            Vaciar carrito
        </button>

    </div>

</div>
<div class="pedido-box">
    <div></div>
    <h2>Confirmar Pedido</h2>


    <h3>Datos del pedido</h3>
    <input
            type="email"
            id="emailCliente"
            placeholder="Ingrese su email"
    />

    <button class="btn-vaciar" onclick="buscarCliente()">
        Buscar cliente
    </button>

    <br><br>

    <select id="direccionSelect">
        <option value="">Seleccione un domicilio</option>
    </select>

    <br><br>

    <select id="formaPago">
        <option value="">Seleccione un metodo de pago</option>
        <option value="EFECTIVO">Efectivo contra entrega</option>
    </select>

    <br><br>

    <button class="btn-vaciar" onclick="confirmarPedido()">
        Confirmar Pedido
    </button>
</div>


</body>
</html>
