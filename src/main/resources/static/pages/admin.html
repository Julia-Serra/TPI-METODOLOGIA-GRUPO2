<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>Panel Admin | BodyPaint</title>

    <link rel="stylesheet" href="../css/styles.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</head>

<script src="/js/core/auth.js"></script>
<script src="/js/core/navbar.js"></script>

<body>

    <div class="navbar">
        <div class="logo">🎨 BodyPaint</div>
        <div id="navbar" class="nav-links"></div>
    </div>

    <script>
        requireLogin(["ROLE_ADMIN"]);
        document.getElementById("adminPanel").classList.remove("hidden");
    </script>


    <div class="admin-page">


        <div class="admin-panel hidden" id="adminPanel">

            <h1>Crear Producto</h1>

            <form id="formProducto">

                <input id="nombre" placeholder="Nombre" required>

                <input id="marca" placeholder="Marca" required>

                <input id="precio" type="number" placeholder="Precio" required>

                <input id="stock" type="number" placeholder="Stock" required>

                <button type="submit">
                    Crear Producto

                </button>
                <br>
            </form>

            <p id="msg"></p>


            <h2> Importar imagen a producto</h2>

            <input id="productoIdImagen" type="number" placeholder="ID del producto">

            <input id="imagenArchivo" type="file" accept="image/*">

            <button id="btnSubirImagen">Subir Imagen</button>

            <p id="msgImagen"></p>

        </div>

    </div>

    <script>

        const API = "http://localhost:8080";

        requireLogin(["ROLE_ADMIN"]);
        


        document
            .getElementById("formProducto")
            .addEventListener("submit", async e => {

                e.preventDefault();

                const producto = {

                    nombre:
                        document.getElementById("nombre").value,

                    marca:
                        document.getElementById("marca").value,

                    precio:
                        parseFloat(
                            document.getElementById("precio").value
                        ),

                    stock:
                        parseInt(
                            document.getElementById("stock").value
                        )
                };

                try {

                    const res =
                        await fetch(`${API}/productos`, {

                            method: "POST",

                            headers: authHeaders(),

                            body: JSON.stringify(producto)
                        });

                    const data =
                        await res.json();

                    if (!res.ok) {

                        document.getElementById("msg")
                            .innerHTML =
                            "❌ Error al crear producto";

                        return;
                    }

                    document.getElementById("msg")
                        .innerHTML =
                        "✅ Producto creado correctamente";

                    document.getElementById("formProducto")
                        .reset();

                } catch (e) {

                    document.getElementById("msg")
                        .innerHTML =
                        "❌ Error de conexión";
                }
            });

        document
            .getElementById("btnSubirImagen")
            .addEventListener("click", async () => {

                const id =
                    document.getElementById("productoIdImagen").value;

                const archivo =
                    document.getElementById("imagenArchivo").files[0];

                const msg =
                    document.getElementById("msgImagen");

                if (!id || !archivo) {
                    msg.innerHTML =
                        "❌ Debe indicar ID y seleccionar una imagen";
                    return;
                }

                const formData = new FormData();
                formData.append("archivo", archivo);

                try {

                    const res =
                        await fetch(`${API}/productos/${id}/imagen`, {
                            method: "POST",
                            headers: authHeaders(),
                            body: formData
                        });

                    if (!res.ok) {
                        msg.innerHTML =
                            "❌ Error al subir imagen";
                        return;
                    }

                    msg.innerHTML =
                        "✅ Imagen subida correctamente";

                } catch (e) {

                    msg.innerHTML =
                        "❌ Error de conexión";
                }
            });

    </script>


</body>

</html>
